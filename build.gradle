plugins {
    id 'java'
    id("org.flywaydb.flyway") version "12.3.0"
}

group = 'org.example'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    testImplementation platform('org.junit:junit-bom:5.10.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
    implementation group: 'org.hibernate.orm', name: 'hibernate-core', version: '6.5.2.Final'
    implementation group: 'org.apache.commons', name: 'commons-lang3', version: '3.20.0'
    implementation group: 'com.h2database', name: 'h2', version: '2.3.232'
    implementation group: 'org.flywaydb', name: 'flyway-core', version: '12.4.0'

    compileOnly("org.projectlombok:lombok:1.18.44")
    annotationProcessor("org.projectlombok:lombok:1.18.44")
    testCompileOnly("org.projectlombok:lombok:1.18.44")
    testAnnotationProcessor("org.projectlombok:lombok:1.18.44")
}

test {
    useJUnitPlatform()
}

flyway {
    user='SA'
    url= 'jdbc:h2:file:./testdb'
    locations= ['filesystem:src/main/resources/SQLScripts']
}